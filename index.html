<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHARIS配貨系統 | 廖貫坊首席團隊</title>
    <style>
        :root { --gold: #c5a059; --brown: #5d4037; --bg: #ffffff; --mocha: #433422; --success: #2e7d32; }
        body { font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; padding-bottom: 250px; color: #333; -webkit-tap-highlight-color: transparent; }
        
        .header { padding: 40px 20px 20px; text-align: center; border-bottom: 1px solid #f2f2f2; }
        .team-name-top { color: var(--gold); font-size: 13px; letter-spacing: 4px; margin-bottom: 8px; }
        h1 { color: var(--brown); letter-spacing: 7px; margin: 0; font-size: 28px; font-weight: 300; }

        /* 目標選擇區 */
        .target-selector { padding: 15px; text-align: center; background: #fdfaf5; border-bottom: 1px solid #eee; }
        .target-title { font-size: 11px; color: var(--gold); margin-bottom: 10px; letter-spacing: 1px; }
        .target-btns { display: flex; justify-content: center; gap: 8px; }
        .t-btn { border: 1px solid var(--gold); padding: 8px 12px; border-radius: 20px; font-size: 13px; color: var(--gold); cursor: pointer; transition: 0.3s; background: white; }
        .t-btn.active { background: var(--gold); color: white; box-shadow: 0 4px 10px rgba(197, 160, 89, 0.3); }

        .container { max-width: 800px; margin: 0 auto; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 18px 15px; border-bottom: 1px solid #f9f9f9; }
        .p-name { font-weight: 600; font-size: 16px; color: #1a1a1a; display: block; margin-bottom: 4px; }
        .p-price { font-size: 14px; color: var(--mocha); font-weight: 700; font-family: "Optima", serif; }
        .p-rv { font-size: 11px; color: #b8b8b8; margin-left: 10px; }

        .stepper { display: flex; align-items: center; justify-content: flex-end; }
        .btn { width: 34px; height: 34px; border: 1px solid #e0e0e0; background: #fff; border-radius: 50%; font-size: 20px; color: var(--brown); display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .qty-val { width: 40px; text-align: center; font-size: 18px; font-weight: bold; color: var(--brown); border: none; background: transparent; pointer-events: none; }

        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--brown); color: white; border-top: 3px solid var(--gold); z-index: 1000; }
        .sum-container { padding: 15px 10px 10px; }
        .sum-row { display: flex; justify-content: space-around; text-align: center; max-width: 550px; margin: 0 auto; }
        .f-label { font-size: 9px; opacity: 0.6; margin-bottom: 4px; display: block; letter-spacing: 1px; }
        .f-val { font-size: 20px; font-weight: 300; font-family: "Optima", serif; }

        /* 提醒樣式 */
        .reached { color: #52ff7e !important; font-weight: 700; text-shadow: 0 0 10px rgba(82, 255, 126, 0.5); }
        .team-credit { background: rgba(0, 0, 0, 0.15); padding: 10px 10px 35px; text-align: center; font-size: 11px; color: var(--gold); letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="header">
    <div class="team-name-top">廖貫坊首席團隊</div>
    <h1>CHARIS</h1>
</div>

<div class="target-selector">
    <div class="target-title"> 選擇配貨目標 (RV)</div>
    <div class="target-btns">
        <div class="t-btn" onclick="setTarget(2000000, this)">200萬</div>
        <div class="t-btn" onclick="setTarget(5000000, this)">500萬</div>
        <div class="t-btn" onclick="setTarget(10000000, this)">1000萬</div>
    </div>
</div>

<div class="container">
    <div id="main-list"></div>
</div>

<div class="footer">
    <div class="sum-container">
        <div class="sum-row">
            <div><span class="f-label">QUANTITY</span><span id="tq" class="f-val">0</span></div>
            <div><span class="f-label">AMOUNT</span><span id="tp" class="f-val">0</span></div>
            <div><span class="f-label">TOTAL RV</span><span id="tr" class="f-val" style="color:var(--gold)">0</span></div>
        </div>
    </div>
    <div class="team-credit">本系統由 廖貫坊首席團隊 製作出品</div>
</div>

<script>
    let currentTarget = 0;
    let hasAlerted = false;

    const products = [
        {n:"酵素潔顏粉",p:733,r:30000}, {n:"多肽化妝水",p:733,r:30000}, {n:"透明質酸精華",p:978,r:40000},
        {n:"維生素C三件套裝",p:4398,r:180000}, {n:"保濕修護霜 (保鮮膜)",p:611,r:25000}, {n:"防曬霜",p:611,r:25000},
        {n:"BB霜",p:733,r:30000}, {n:"再生修護精華",p:1222,r:50000}, {n:"1號去角質+2號營養面膜",p:3178,r:130000},
        {n:"Q肌底前導精華",p:4398,r:180000}, {n:"119冰潤霜 (3入)",p:1466,r:60000}, {n:"雪顏淨白霜 (2入)",p:1833,r:75000},
        {n:"奇蹟鑽石套裝",p:4398,r:180000}, {n:"HI-Q 肌底面霜",p:2199,r:90000}, {n:"活顏噴霧 [120ml]",p:2199,r:90000},
        {n:"1號水潤去角質面膜 [單瓶]",p:1711,r:70000}, {n:"2號水潤滋養面膜 [單瓶]",p:1711,r:70000},
        {n:"維生素C精華 [單瓶]",p:1222,r:50000}, {n:"多肽霜 [50ml]",p:2199,r:90000}
    ];

    function setTarget(val, btn) {
        currentTarget = val;
        hasAlerted = false;
        document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        calc();
    }

    const container = document.getElementById('main-list');
    let html = '<table>';
    products.forEach((p, i) => {
        html += `<tr><td><span class="p-name">${p.n}</span><span class="p-price">$ ${p.p.toLocaleString()}</span><span class="p-rv">${p.r.toLocaleString()} RV</span></td>
            <td><div class="stepper"><div class="btn" onclick="change(${i}, -1)">−</div><input type="number" class="qty-val" id="q-${i}" value="0" readonly><div class="btn" onclick="change(${i}, 1)">+</div></div></td></tr>`;
    });
    container.innerHTML = html + '</table>';

    function change(index, delta) {
        const input = document.getElementById(`q-${index}`);
        let val = parseInt(input.value) + delta;
        if (val < 0) val = 0; input.value = val; calc();
    }

    function calc() {
        let tq = 0, tp = 0, tr = 0;
        products.forEach((p, i) => {
            const q = parseInt(document.getElementById(`q-${i}`).value);
            tq += q; tp += q * p.p; tr += q * p.r;
        });
        
        const rvDisplay = document.getElementById('tr');
        document.getElementById('tq').innerText = tq;
        document.getElementById('tp').innerText = tp.toLocaleString();
        rvDisplay.innerText = tr.toLocaleString();

        // 達標提醒邏輯
        if (currentTarget > 0 && tr >= currentTarget) {
            rvDisplay.classList.add('reached');
            if (!hasAlerted) {
                alert(`🎊 恭喜！已達成目標配貨量：${(currentTarget/10000).toLocaleString()}萬 RV`);
                hasAlerted = true;
            }
        } else {
            rvDisplay.classList.remove('reached');
            hasAlerted = false; 
        }
    }
</script>
</body>
</html>
