<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHARIS 訂購明細 | 廖貫坊首席團隊</title>
    <style>
        :root {
            /* 精品專櫃色系：炭黑 + 香檳金 + 珍珠白 */
            --primary-dark: #2B2A29; 
            --text-main: #3E3D3C;
            --text-light: #8B8682;
            --accent-gold: #C2A578; 
            --accent-gold-dark: #9A7B54; 
            --accent-gold-light: #E8DECE;
            --bg-color: #FAFAF8; 
            --card-bg: #FFFFFF;
            --border-color: #ECEAE5;
            --success-green: #378b5e; 
        }

        /* 終極防跑版設定 */
        * { box-sizing: border-box; }

        body { 
            font-family: 'Helvetica Neue', 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            background: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0;
            padding-bottom: 250px; 
            font-weight: 300; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        .header { text-align: center; padding: 40px 20px 20px; background-color: var(--bg-color); border-bottom: 1px solid var(--border-color); }
        .team-name-top { color: var(--accent-gold); font-size: 13px; letter-spacing: 6px; margin-bottom: 10px; font-weight: bold; }
        h1 { font-family: 'Times New Roman', Times, serif; font-size: 38px; font-weight: 300; letter-spacing: 12px; color: var(--primary-dark); margin: 0; }

        /* 表單：客戶姓名輸入框 */
        .form-wrapper { max-width: 700px; margin: 0 auto; padding: 25px 25px 0; background: var(--bg-color); }
        .form-group { background: transparent; margin-bottom: 10px; }
        .input-row { margin-bottom: 15px; }
        .input-label { font-size: 12px; color: var(--text-light); margin-bottom: 5px; display: block; letter-spacing: 2px;}
        input[type="text"] { width: 100%; padding: 10px 0; border: none; border-bottom: 1px solid var(--accent-gold); background-color: transparent; font-size: 16px; color: var(--primary-dark); outline: none; transition: border-color 0.3s; }
        input[type="text"]:focus { border-bottom-color: var(--primary-dark); }

        /* 截圖模式專用抬頭 */
        .print-header { display: none; text-align: center; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border-color); position: relative; }
        .print-header::after { content: ''; position: absolute; bottom: -1px; left: 40%; width: 20%; height: 1px; background: var(--accent-gold); }

        /* 目標選擇區 */
        .target-selector { padding: 25px 15px; text-align: center; background: #fff; border-bottom: 1px solid var(--border-color); box-shadow: 0 4px 15px rgba(0,0,0,0.01); }
        .target-title { font-size: 13px; color: var(--text-light); margin-bottom: 15px; letter-spacing: 4px; text-transform: uppercase; }
        .target-btns { display: flex; justify-content: center; gap: 12px; }
        .t-btn { border: 1px solid var(--accent-gold); padding: 10px 20px; border-radius: 30px; font-size: 14px; font-weight: bold; color: var(--accent-gold); cursor: pointer; transition: all 0.3s ease; background: var(--card-bg); letter-spacing: 1px;}
        .t-btn.active { background: var(--primary-dark); color: #fff; border-color: var(--primary-dark); box-shadow: 0 4px 15px rgba(43, 42, 41, 0.2); }

        .container { max-width: 700px; margin: 0 auto; padding: 10px 15px; }
        
        /* ✨ 產品列表樣式 ✨ */
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        td { padding: 20px 0; border-bottom: 1px solid var(--border-color); vertical-align: middle; }
        
        /* 預設隱藏列印專屬欄位 */
        .show-on-print { display: none !important; }
        
        .product-info-cell { width: 70%; padding-right: 10px; overflow: hidden; } 
        .stepper-cell { width: 30%; white-space: nowrap; text-align: right; }
        
        /* 照片與文字排版 */
        .product-flex-wrap { display: flex; align-items: center; width: 100%; overflow: hidden; }
        .product-image-wrapper { width: 44px; height: 44px; flex-shrink: 0; margin-right: 12px; border-radius: 50%; background-color: var(--card-bg); border: 1px solid var(--accent-gold); display: flex; align-items: center; justify-content: center; font-size: 15px; color: var(--accent-gold); font-weight: bold; overflow: hidden; }
        .product-image-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        
        .product-details { flex-grow: 1; min-width: 0; overflow: hidden; }
        
        /* 強制單行顯示 */
        .p-name { 
            font-weight: bold; font-size: 15px; color: var(--primary-dark); 
            display: block; margin-bottom: 6px; letter-spacing: 1px;
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }
        
        .step-badge { display: inline-block; border: 1px solid var(--accent-gold); color: var(--accent-gold); padding: 0px 6px; border-radius: 12px; font-size: 10px; font-weight: bold; letter-spacing: 0.5px; background: #fff; margin-right: 3px; vertical-align: middle; margin-bottom: 2px;}

        .price-row { display: flex; align-items: center; gap: 8px; flex-wrap: nowrap; overflow: hidden; }
        .p-price { font-size: 14px; color: var(--text-main); font-weight: bold; font-family: 'Helvetica Neue', sans-serif; white-space: nowrap; }
        .p-rv { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; color: var(--accent-gold-dark); background-color: #fff; border: 1px solid var(--accent-gold-light); font-weight: bold; letter-spacing: 1px; white-space: nowrap;}

        /* 微調鈕 Stepper */
        .stepper { display: inline-flex; align-items: center; justify-content: flex-end; background: transparent; border: 1px solid var(--border-color); border-radius: 20px; overflow: hidden; }
        .btn { width: 32px; height: 32px; background: var(--bg-color); border: none; font-size: 18px; color: var(--primary-dark); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: var(--accent-gold-light); }
        .btn:active { background: var(--accent-gold); color: #fff; }
        .qty-val { width: 30px; text-align: center; font-size: 14px; font-weight: bold; color: var(--primary-dark); border: none; background: transparent; pointer-events: none; padding: 0; margin: 0; }

        /* 底部統計區 (編輯模式) */
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); color: var(--primary-dark); border-top: 1px solid var(--border-color); z-index: 1000; box-shadow: 0 -5px 20px rgba(0,0,0,0.03); }
        
        .sum-container { padding: 15px 10px 10px; }
        .sum-row { display: flex; justify-content: space-between; text-align: center; max-width: 600px; margin: 0 auto; }
        .sum-item { flex: 1; border-right: 1px solid var(--border-color); }
        .sum-item:last-child { border-right: none; }
        
        .f-label { font-size: 10px; color: var(--text-light); margin-bottom: 4px; display: block; letter-spacing: 1px; text-transform: uppercase; font-weight: bold; }
        .f-val { font-size: 20px; font-weight: bold; font-family: 'Helvetica Neue', sans-serif; color: var(--primary-dark); }
        #tr { color: var(--accent-gold-dark); } 

        .reached { color: var(--success-green) !important; font-weight: 800; text-shadow: 0 0 15px rgba(55, 139, 94, 0.3); transition: 0.3s; }
        
        /* 列印模式專用統計區 */
        .print-summary { display: none; margin-top: 20px; border-top: 2px solid var(--border-color); padding-top: 15px; }
        .print-summary-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; letter-spacing: 1px; color: var(--primary-dark); font-weight: bold; }
        .print-summary-row.total-amount { font-size: 16px; color: var(--accent-gold-dark); margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border-color); }

        /* 生成按鈕 */
        .action-bar { padding: 0 15px 20px; text-align: center; }
        .generate-btn { background-color: var(--primary-dark); color: #fff; border: none; padding: 12px 30px; font-size: 14px; letter-spacing: 2px; border-radius: 30px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(43, 42, 41, 0.2); width: 100%; max-width: 400px; }
        
        /* 系統版權宣告 */
        .team-credit { background: transparent; padding: 5px 10px 15px; text-align: center; font-size: 10px; color: var(--text-light); letter-spacing: 2px; font-weight: 300; }
        .print-credit { display: none; text-align: center; color: var(--text-light); font-size: 11px; letter-spacing: 2px; margin-top: 30px; padding-top: 15px; border-top: 1px solid var(--border-color); font-weight: 300; }

        /* ✨ 截圖模式 (Print Mode) 專屬設定 ✨ */
        body.print-mode { background-color: #fff; padding-bottom: 40px; }
        body.print-mode .hide-on-print { display: none !important; }
        
        /* 截圖模式：顯示列印專屬欄位 */
        body.print-mode .show-on-print { display: table-cell !important; }
        body.print-mode thead.show-on-print { display: table-header-group !important; }
        body.print-mode div.show-on-print { display: block !important; }

        /* 截圖表頭設計 */
        .print-table-header th {
            color: var(--accent-gold-dark);
            font-size: 12px;
            letter-spacing: 2px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--accent-gold);
            font-weight: bold;
        }
        
        /* ✨ 截圖欄位寬度與對齊優化 (數量靠右) ✨ */
        body.print-mode .product-info-cell { width: 55%; }
        /* 數量：靠右對齊並保留一點右邊距，與金額錯開 */
        body.print-mode .print-qty-cell { width: 20%; text-align: right; padding-right: 15px; font-size: 16px; font-family: 'Helvetica Neue', sans-serif; font-weight: bold; color: var(--text-main); }
        /* 金額：靠最右邊 */
        body.print-mode .print-amt-cell { width: 25%; text-align: right; font-size: 15px; font-family: 'Helvetica Neue', sans-serif; font-weight: bold; color: var(--primary-dark); }
        
        /* 隱藏單價列，讓畫面更乾淨 */
        body.print-mode .price-row { display: none !important; }
        body.print-mode .p-name { margin-bottom: 0; }

        /* 精品金框 */
        body.print-mode .container { 
            max-width: 100%; 
            padding: 30px 20px; 
            border: 1px solid var(--accent-gold-light); 
            outline: 1px solid var(--accent-gold-light); 
            outline-offset: -6px; 
            margin: 10px; 
            background: #fff; 
        }
        
        body.print-mode .print-header { display: block; }
        body.print-mode .print-summary { display: block; }
        body.print-mode .print-credit { display: block; }
        
        body.print-mode td { padding: 12px 0; border-bottom: 1px dashed var(--border-color); }
        body.print-mode .product-image-wrapper { border-color: var(--border-color); color: var(--text-light); }

        /* 返回按鈕 */
        .return-bar { text-align: center; margin: 20px auto 40px; display: none; }
        .btn-back { background-color: #fff; color: var(--primary-dark); border: 1px solid var(--primary-dark); padding: 10px 30px; border-radius: 30px; font-size: 14px; cursor: pointer; letter-spacing: 2px; transition: 0.3s; }
        .btn-back:hover { background: var(--bg-color); }

        /* ✨ 手機版極限自適應優化 ✨ */
        @media (max-width: 480px) {
            .product-info-cell { width: 70%; padding-right: 5px; } 
            .stepper-cell { width: 30%; }
            
            /* 圓框再微調，讓出空間給文字 */
            .product-image-wrapper { width: 32px; height: 32px; margin-right: 8px; font-size: 13px; }
            .p-name { font-size: 13px; letter-spacing: 0px; }
            .price-row { gap: 5px; }
            .p-price { font-size: 12px; }
            .p-rv { font-size: 9px; padding: 2px 4px; }
            
            .stepper .btn { width: 28px; height: 28px; font-size: 16px; }
            .stepper .qty-val { width: 25px; font-size: 13px; }
            
            /* 截圖模式在手機上的完美縮放 */
            body.print-mode .container { padding: 25px 12px 20px; margin: 8px; outline-offset: -4px; }
            body.print-mode h2 { font-size: 22px; letter-spacing: 8px; }
            body.print-mode .p-name { font-size: 11.5px; } 
            
            /* 數量列在手機上右邊距稍微調小，保持平衡 */
            body.print-mode .print-qty-cell { font-size: 14px; padding-right: 10px; }
            body.print-mode .print-amt-cell { font-size: 13px; }
            
            .print-table-header th { font-size: 10px; padding-bottom: 8px; }
        }

    </style>
</head>
<body>

<div class="header hide-on-print">
    <div class="team-name-top">廖貫坊首席團隊</div>
    <h1>CHARIS</h1>
</div>

<div class="form-wrapper hide-on-print">
    <div class="form-group">
        <div class="input-row">
            <label class="input-label">CLIENT NAME</label>
            <input type="text" id="clientName" placeholder="請輸入貴賓姓名或暱稱">
        </div>
    </div>
</div>

<div class="target-selector hide-on-print">
    <div class="target-title">Target RV 選擇配貨目標</div>
    <div class="target-btns">
        <div class="t-btn" onclick="setTarget(2000000, this)">200 萬</div>
        <div class="t-btn" onclick="setTarget(5000000, this)">500 萬</div>
        <div class="t-btn" onclick="setTarget(10000000, this)">1,000 萬</div>
    </div>
</div>

<div class="container">
    
    <div class="print-header">
        <div style="font-size: 11px; color: var(--accent-gold); letter-spacing: 3px; margin-bottom: 6px; text-transform: uppercase; font-weight: bold;">Order Summary</div>
        <div style="font-size: 14px; color: var(--text-light); letter-spacing: 5px; margin-bottom: 10px; font-weight: bold;">廖貫坊首席團隊</div>
        <h2 style="color:var(--primary-dark); letter-spacing: 10px; margin:0 0 15px 0; font-weight: 300; font-size: 26px;">訂購明細</h2>
        
        <div id="display-client-info" style="color:var(--text-main); font-size:13px; line-height: 1.6; letter-spacing: 1px;"></div>
    </div>

    <div id="main-list"></div>
    
    <div class="print-summary">
        <div class="print-summary-row">
            <span>總數量 Total Quantity</span>
            <span id="print-tq">0</span>
        </div>
        <div class="print-summary-row">
            <span>總積分 Total RV</span>
            <span id="print-tr" style="font-family: Helvetica Neue;">0</span>
        </div>
        <div class="print-summary-row total-amount">
            <span>總金額 Total Amount</span>
            <span id="print-tp" style="font-family: Helvetica Neue;">$ 0</span>
        </div>
    </div>
    
    <div class="print-credit">本系統由 廖貫坊首席團隊 製作出品</div>
    
</div>

<div class="return-bar" id="returnBar">
    <button class="btn-back" onclick="returnToEdit()">⬅ BACK 重新編輯</button>
</div>

<div class="footer hide-on-print">
    <div class="sum-container">
        <div class="sum-row">
            <div class="sum-item"><span class="f-label">TOTAL QTY</span><span id="tq" class="f-val">0</span></div>
            <div class="sum-item"><span class="f-label">AMOUNT ($)</span><span id="tp" class="f-val">0</span></div>
            <div class="sum-item"><span class="f-label">TOTAL RV</span><span id="tr" class="f-val">0</span></div>
        </div>
    </div>
    <div class="action-bar">
        <button class="generate-btn" onclick="generateOrder()">產出訂購明細</button>
    </div>
    <div class="team-credit">本系統由 廖貫坊首席團隊 製作出品</div>
</div>

<script>
    let currentTarget = 0;
    let hasAlerted = false;

    // 產品清單
    const products = [
        {n:"酵素潔顏粉", p:733, r:30000, i:"潔"}, 
        {n:"多肽化妝水", p:733, r:30000, i:"水"}, 
        {n:"透明質酸精華", p:978, r:40000, i:"透"},
        {n:"維生素C三件套裝", p:4398, r:180000, i:"C"}, 
        {n:"保濕修護霜", p:611, r:25000, i:"護"}, 
        {n:"防曬霜", p:611, r:25000, i:"防"},
        {n:"BB霜", p:733, r:30000, i:"B"}, 
        {n:"再生修護精華 [單瓶]", p:1222, r:50000, i:"修"}, 
        {n:"<span class='step-badge'>No.1</span>去角質 + <span class='step-badge'>No.2</span>營養面膜", p:3178, r:130000, i:"套"},
        {n:"Q肌底安瓶", p:4398, r:180000, i:"Q"}, 
        {n:"119面膜 (3入)", p:1466, r:60000, i:"急"}, 
        {n:"淨白雪顏霜 (2入)", p:1833, r:75000, i:"雪"},
        {n:"奇蹟鑽石套裝", p:4398, r:180000, i:"鑽"}, 
        {n:"Hi-Q肌底面霜", p:2199, r:90000, i:"Q"}, 
        {n:"活顏噴霧 [120ml]", p:2199, r:90000, i:"水"},
        {n:"<span class='step-badge'>No.1</span>去角質面膜 [單]", p:1711, r:70000, i:"1"}, 
        {n:"<span class='step-badge'>No.2</span>營養面膜 [單]", p:1711, r:70000, i:"2"},
        {n:"維生素C精華 [單瓶]", p:1222, r:50000, i:"C"}, 
        {n:"多肽霜 [單瓶]", p:2199, r:90000, i:"肽"}
    ];

    function setTarget(val, btn) {
        currentTarget = val;
        hasAlerted = false;
        document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        calc();
    }

    // 初始化渲染列表
    const container = document.getElementById('main-list');
    let html = '<table>';
    
    // ✨ 專屬列印模式的表格抬頭 (數量標題也設定靠右對齊並加上右邊距) ✨
    html += `
    <thead class="show-on-print print-table-header">
        <tr>
            <th style="text-align: left; width: 55%;">品項 ITEM</th>
            <th style="text-align: right; width: 20%; padding-right: 15px;">數量</th>
            <th style="text-align: right; width: 25%;">金額</th>
        </tr>
    </thead>
    <tbody>
    `;

    products.forEach((p, i) => {
        let iconChar = p.i;
        
        html += `
        <tr id="row-${i}">
            <td class="product-info-cell">
                <div class="product-flex-wrap">
                    <div class="product-image-wrapper">${iconChar}</div>
                    <div class="product-details">
                        <span class="p-name">${p.n}</span>
                        <div class="price-row hide-on-print">
                            <span class="p-price">$ ${p.p.toLocaleString()}</span>
                            <span class="p-rv">${p.r.toLocaleString()} RV</span>
                        </div>
                    </div>
                </div>
            </td>
            
            <td class="stepper-cell hide-on-print" align="right">
                <div class="stepper">
                    <div class="btn" onclick="change(${i}, -1)">−</div>
                    <input type="number" class="qty-val" id="q-${i}" value="0" readonly>
                    <div class="btn" onclick="change(${i}, 1)">+</div>
                </div>
            </td>
            
            <td class="print-qty-cell show-on-print">
                <span id="pq-${i}">0</span>
            </td>
            <td class="print-amt-cell show-on-print">
                $ <span id="pa-${i}">0</span>
            </td>
        </tr>`;
    });
    html += '</tbody></table>';
    container.innerHTML = html;

    function change(index, delta) {
        const input = document.getElementById(`q-${index}`);
        let val = parseInt(input.value) + delta;
        if (val < 0) val = 0; 
        input.value = val; 
        calc();
    }

    function calc() {
        let tq = 0, tp = 0, tr = 0;
        products.forEach((p, i) => {
            const q = parseInt(document.getElementById(`q-${i}`).value);
            tq += q; 
            const itemTotal = q * p.p;
            tp += itemTotal; 
            tr += q * p.r;
            
            // 同步更新列印模式的單項數量與金額
            document.getElementById(`pq-${i}`).innerText = q;
            document.getElementById(`pa-${i}`).innerText = itemTotal.toLocaleString();
        });
        
        const rvDisplay = document.getElementById('tr');
        
        document.getElementById('tq').innerText = tq;
        document.getElementById('tp').innerText = tp.toLocaleString();
        rvDisplay.innerText = tr.toLocaleString();

        document.getElementById('print-tq').innerText = tq;
        document.getElementById('print-tp').innerText = "$ " + tp.toLocaleString();
        document.getElementById('print-tr').innerText = tr.toLocaleString() + " RV";

        // 達標提醒
        if (currentTarget > 0 && tr >= currentTarget) {
            rvDisplay.classList.add('reached');
            if (!hasAlerted) {
                setTimeout(() => {
                    alert(`🎊 恭喜！已達成目標配貨量：${(currentTarget/10000).toLocaleString()} 萬 RV`);
                }, 100);
                hasAlerted = true;
            }
        } else {
            rvDisplay.classList.remove('reached');
            hasAlerted = false; 
        }
    }

    // 產出訂購明細
    function generateOrder() {
        let hasItems = false;
        
        products.forEach((p, i) => {
            const q = parseInt(document.getElementById(`q-${i}`).value);
            const row = document.getElementById(`row-${i}`);
            if (q === 0) {
                row.style.display = 'none';
            } else {
                row.style.display = ''; // 恢復預設 table-row
                hasItems = true;
            }
        });

        if (!hasItems) {
            alert("請先選擇至少一項產品！");
            products.forEach((p, i) => document.getElementById(`row-${i}`).style.display = '');
            return;
        }

        const name = document.getElementById('clientName').value || '貴賓';
        const dateStr = new Date().toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit' });
        document.getElementById('display-client-info').innerHTML = `<strong>CLIENT:</strong> ${name}<br><strong>DATE:</strong> ${dateStr}`;

        document.body.classList.add('print-mode');
        document.getElementById('returnBar').style.display = 'block';
        window.scrollTo(0, 0);
    }

    // 返回重新編輯
    function returnToEdit() {
        document.body.classList.remove('print-mode');
        document.getElementById('returnBar').style.display = 'none';
        
        products.forEach((p, i) => document.getElementById(`row-${i}`).style.display = '');
        window.scrollTo(0, 0);
    }
</script>
</body>
</html>
