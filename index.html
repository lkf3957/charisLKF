<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHARIS | 廖貫坊首席團隊</title>
    <style>
        :root { --gold: #c5a059; --brown: #5d4037; --bg: #ffffff; --mocha: #433422; }
        body { font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; color: #333; -webkit-tap-highlight-color: transparent; }
        
        /* 頂部 Header */
        .header { padding: 45px 20px 25px; text-align: center; border-bottom: 1px solid #f2f2f2; }
        .team-name-top { color: var(--gold); font-size: 13px; letter-spacing: 4px; margin-bottom: 10px; font-weight: 400; }
        h1 { color: var(--brown); letter-spacing: 7px; margin: 0; font-size: 30px; font-weight: 300; }
        .sub { color: var(--gold); font-size: 10px; margin-top: 10px; letter-spacing: 2px; opacity: 0.8; }

        /* 主內容區 - RWD 排版 */
        .container { max-width: 800px; margin: 0 auto; padding-bottom: 220px; } /* 電腦版限制寬度 */
        
        /* 產品列表 */
        table { width: 100%; border-collapse: collapse; }
        td { padding: 22px 15px; border-bottom: 1px solid #f9f9f9; }
        .p-name { font-weight: 600; font-size: 17px; color: #1a1a1a; display: block; margin-bottom: 6px; }
        .p-price { font-size: 15px; color: var(--mocha); font-weight: 700; font-family: "Optima", serif; }
        .p-rv { font-size: 11px; color: #b8b8b8; margin-left: 10px; font-weight: 300; }

        /* 數量控制器 (Stepper) */
        .stepper { display: flex; align-items: center; justify-content: flex-end; }
        .btn { width: 34px; height: 34px; border: 1px solid #e0e0e0; background: #fff; border-radius: 50%; font-size: 20px; color: var(--brown); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .btn:active { background: #f5f5f5; transform: scale(0.9); }
        .qty-val { width: 45px; text-align: center; font-size: 20px; font-weight: bold; color: var(--brown); border: none; background: transparent; -webkit-appearance: none; margin: 0; pointer-events: none; }

        /* 底部計算欄位 (RWD 固定在下方) */
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--brown); color: white; border-top: 3px solid var(--gold); z-index: 1000; box-shadow: 0 -10px 30px rgba(0,0,0,0.2); }
        .sum-container { padding: 20px 15px 12px; }
        .sum-row { display: flex; justify-content: space-around; text-align: center; max-width: 550px; margin: 0 auto; }
        .f-label { font-size: 9px; opacity: 0.6; margin-bottom: 6px; display: block; letter-spacing: 1.5px; }
        .f-val { font-size: 22px; font-weight: 300; font-family: "Optima", serif; }

        /* 團隊宣告區塊 (電腦與手機皆清晰) */
        .team-credit { 
            background: rgba(0, 0, 0, 0.15);
            padding: 12px 10px 35px; /* 增加底部填充 */
            text-align: center; 
            font-size: 11px; 
            color: var(--gold); 
            letter-spacing: 2px; 
            font-weight: 400;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        /* 電腦版微調 (螢幕寬度大於 800px) */
        @media (min-width: 800px) {
            .header { padding: 60px 20px 30px; }
            h1 { font-size: 36px; }
            .team-name-top { font-size: 15px; }
            .sub { font-size: 12px; }
            td { padding: 25px 20px; }
            .p-name { font-size: 18px; }
            .p-price { font-size: 16px; }
            .btn { width: 38px; height: 38px; }
            .qty-val { width: 55px; font-size: 22px; }
            .f-val { font-size: 26px; }
            .team-credit { font-size: 13px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="team-name-top">廖貫坊首席團隊</div>
    <h1>CHARIS</h1>
    <div class="sub">PREMIUM CALCULATION SYSTEM</div>
</div>

<div class="container">
    <div id="main-list"></div>
</div>

<div class="footer">
    <div class="sum-container">
        <div class="sum-row">
            <div><span class="f-label">QUANTITY</span><span id="tq" class="f-val">0</span></div>
            <div><span class="f-label">AMOUNT</span><span id="tp" class="f-val">0</span></div>
            <div><span class="f-label">TOTAL RV</span><span id="tr" class="f-val" style="color:var(--gold)">0</span></div>
        </div>
    </div>
    <div class="team-credit">
        本系統由 廖貫坊首席團隊 製作出品
    </div>
</div>

<script>
    const products = [
        {n:"酵素潔面粉",p:733,r:30000}, {n:"多肽化妝水",p:733,r:30000}, {n:"透明質酸精華",p:978,r:40000},
        {n:"維生素C三件套裝",p:4398,r:180000}, {n:"保濕修護霜 (保鮮膜)",p:611,r:25000}, {n:"防曬霜",p:611,r:25000},
        {n:"滋潤BB霜",p:733,r:30000}, {n:"再生修護精華",p:1222,r:50000}, {n:"1號去角質+2號營養面膜",p:3178,r:130000},
        {n:"Q肌底前導精華",p:4398,r:180000}, {n:"119冰潤霜 (3入)",p:1466,r:60000}, {n:"雪顏淨白霜 (2入)",p:1833,r:75000},
        {n:"奇蹟鑽石套裝",p:4398,r:180000}, {n:"HI-Q 肌底面霜",p:2199,r:90000}, {n:"活顏噴霧 [120ml]",p:2199,r:90000},
        {n:"水潤去角質面膜 [單瓶]",p:1711,r:70000}, {n:"水潤滋養面膜 [單瓶]",p:1711,r:70000},
        {n:"維生素C精華 [單瓶]",p:1222,r:50000}, {n:"多肽霜 [50ml]",p:2199,r:90000}
    ];

    const container = document.getElementById('main-list');
    let html = '<table>';
    products.forEach((p, i) => {
        html += `<tr>
            <td>
                <span class="p-name">${p.n}</span>
                <span class="p-price">$ ${p.p.toLocaleString()}</span><span class="p-rv">${p.r.toLocaleString()} RV</span>
            </td>
            <td>
                <div class="stepper">
                    <div class="btn" onclick="change(${i}, -1)">−</div>
                    <input type="number" class="qty-val" id="q-${i}" value="0" readonly>
                    <div class="btn" onclick="change(${i}, 1)">+</div>
                </div>
            </td>
        </tr>`;
    });
    container.innerHTML = html + '</table>';

    function change(index, delta) {
        const input = document.getElementById(`q-${index}`);
        let val = parseInt(input.value) + delta;
        if (val < 0) val = 0;
        input.value = val;
        calc();
    }

    function calc() {
        let totalQ = 0, totalP = 0, totalR = 0;
        products.forEach((p, i) => {
            const q = parseInt(document.getElementById(`q-${i}`).value);
            totalQ += q;
            totalP += q * p.p;
            totalR += q * p.r;
        });
        document.getElementById('tq').innerText = totalQ;
        document.getElementById('tp').innerText = totalP.toLocaleString();
        document.getElementById('tr').innerText = totalR.toLocaleString();
    }
</script>
</body>
</html>
